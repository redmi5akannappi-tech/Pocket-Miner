# render.yaml — Render Blueprint
# ONE web service that builds the React frontend and serves it from the Node
# backend alongside the API (/api) and WebSocket (/ws) on a single origin.
# Push to your repo root, then Render → New → Blueprint.

services:
  - type: web
    name: pocket-miner
    runtime: node
    plan: free
    # Build the client (Vite → client/dist) then install server deps.
    buildCommand: npm --prefix client install && npm --prefix client run build && npm --prefix server install
    # Server serves client/dist + /api + /ws. Binds to $PORT (injected by Render).
    startCommand: node server/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the server reads process.env.PORT.
      - key: USE_MEMORY
        value: true            # true = run without MongoDB. Set false + MONGODB_URI to persist.
      - key: DEV_BYPASS
        value: false           # MUST be false in production (Telegram auth required)
      - key: MONGODB_URI
        sync: false            # optional — set in dashboard if USE_MEMORY=false
      - key: TELEGRAM_BOT_TOKEN
        sync: false            # set manually in Render dashboard
      - key: WALLET_ADDRESS
        value: RS3cJERG58N2GJbZSP3MpkFunACZ4kawpZ
      - key: POOL_HOST
        value: ap.luckpool.net
      - key: POOL_HOST_BACKUP
        value: na.luckpool.net
      - key: POOL_PORT
        value: 3956
      - key: POOL_ALGORITHM
        value: verushash
      - key: WORKER_NAME
        value: pocketminer
      - key: POOL_REWARD_RATE
        value: 0.0001
      - key: POINTS_PER_SHARE
        value: 10
      - key: SESSION_BONUS_MULTIPLIER
        value: 1.5
      - key: MIN_WITHDRAWAL
        value: 0.001
      - key: MAX_SHARES_PER_MINUTE
        value: 60
      - key: MAX_HASHRATE_MH
        value: 10
      # Frontend + backend share one origin now, so no VITE_API_URL / VITE_WS_URL
      # (the app uses relative /api and same-host /ws) and no cross-origin CORS.
